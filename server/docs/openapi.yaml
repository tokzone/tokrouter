openapi: 3.0.3
info:
  title: tokrouter API
  description: |
    LLM API Gateway and Router.

    tokrouter provides a unified interface for multiple LLM providers with:
    - Protocol conversion (OpenAI ↔ Anthropic)
    - Automatic fallback and retry
    - Circuit breaker for endpoint health
    - Cost tracking and usage statistics

    Configure providers in config.yaml and start with `tokrouter serve`.
  version: 0.7.4
  contact:
    name: tokrouter
    url: https://github.com/tokzone/tokrouter

servers:
  - url: http://127.0.0.1:8765
    description: Local development server

paths:
  /v1/chat/completions:
    post:
      summary: Chat Completion (OpenAI format)
      description: |
        Send a chat completion request. Supports both streaming and non-streaming modes.
        Requests are forwarded to configured providers with automatic protocol conversion.
      operationId: chatCompletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
            examples:
              basic:
                summary: Basic request
                value:
                  model: gpt-4o
                  messages:
                    - role: user
                      content: Hello!
              streaming:
                summary: Streaming request
                value:
                  model: gpt-4o
                  messages:
                    - role: user
                      content: Hello!
                  stream: true
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
            text/event-stream:
              schema:
                type: string
                description: SSE stream of completion chunks
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Upstream error or no available endpoints
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/messages:
    post:
      summary: Messages (Anthropic format)
      description: |
        Send a message request using Anthropic's API format.
        Requests are forwarded to configured providers with automatic protocol conversion.
      operationId: messages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessagesRequest'
            examples:
              basic:
                summary: Basic request
                value:
                  model: claude-3-5-sonnet-20241022
                  max_tokens: 1024
                  messages:
                    - role: user
                      content: Hello!
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessagesResponse'
            text/event-stream:
              schema:
                type: string
                description: SSE stream of message chunks
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Upstream error or no available endpoints
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/responses:
    post:
      summary: Responses API (OpenAI format)
      description: |
        Send a request using OpenAI's Responses API format.
        TokRouter converts to Chat Completions, forwards, and converts the response back.
      operationId: responses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResponsesRequest'
            examples:
              basic:
                summary: Basic request
                value:
                  model: gpt-4o
                  input: [{"type": "message", "role": "user", "content": "Hello!"}]
                  instructions: "Be helpful."
              streaming:
                summary: Streaming request
                value:
                  model: gpt-4o
                  input: "Hello!"
                  stream: true
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsesResponse'
            text/event-stream:
              schema:
                type: string
                description: SSE stream of Responses API events
        '400':
          $ref: '#/paths/~1v1~1chat~1completions/post/responses/400'
        '503':
          $ref: '#/paths/~1v1~1chat~1completions/post/responses/503'

  /v1/models:
    get:
      summary: List models
      description: Returns all available models with metadata (context window, modalities)
      operationId: listModels
      responses:
        '200':
          description: Model list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelList'

  /v1/models/{model}:
    get:
      summary: Get model by ID
      operationId: getModel
      parameters:
        - name: model
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Model details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelEntry'
        '404':
          description: Model not found

  /health:
    get:
      summary: Health check
      description: Returns service health status including endpoint availability
      operationId: health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service is degraded (no healthy endpoints)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /status:
    get:
      summary: Provider status
      description: Returns status of all configured providers and their models
      operationId: status
      responses:
        '200':
          description: Provider status list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProviderStatus'

components:
  schemas:
    ChatCompletionRequest:
      type: object
      required:
        - model
        - messages
      properties:
        model:
          type: string
          description: Model name or alias
          example: gpt-4o
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
          description: Conversation messages
        stream:
          type: boolean
          default: false
          description: Enable streaming response
        max_tokens:
          type: integer
          description: Maximum tokens in response
        temperature:
          type: number
          format: float
          minimum: 0
          maximum: 2
          description: Sampling temperature
        top_p:
          type: number
          format: float
          description: Top-p sampling

    ChatMessage:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum: [system, user, assistant]
          description: Message role
        content:
          type: string
          description: Message content
        name:
          type: string
          description: Optional name for the participant

    ChatCompletionResponse:
      type: object
      properties:
        id:
          type: string
          description: Response ID
        object:
          type: string
          example: chat.completion
        created:
          type: integer
          format: int64
          description: Creation timestamp
        model:
          type: string
          description: Model used
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                $ref: '#/components/schemas/ChatMessage'
              finish_reason:
                type: string
        usage:
          $ref: '#/components/schemas/Usage'

    MessagesRequest:
      type: object
      required:
        - model
        - max_tokens
        - messages
      properties:
        model:
          type: string
          description: Model name
          example: claude-3-5-sonnet-20241022
        max_tokens:
          type: integer
          description: Maximum tokens in response
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum: [user, assistant]
              content:
                type: string
        system:
          type: string
          description: System prompt
        stream:
          type: boolean
          default: false

    MessagesResponse:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          example: message
        role:
          type: string
          example: assistant
        content:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              text:
                type: string
        model:
          type: string
        stop_reason:
          type: string
        usage:
          $ref: '#/components/schemas/Usage'

    Usage:
      type: object
      properties:
        prompt_tokens:
          type: integer
          description: Input tokens used
        completion_tokens:
          type: integer
          description: Output tokens generated
        total_tokens:
          type: integer
          description: Total tokens

    ResponsesRequest:
      type: object
      required:
        - model
        - input
      properties:
        model:
          type: string
          description: Model name
          example: gpt-4o
        input:
          description: Input content — string, content blocks, or message items
        instructions:
          type: string
          description: System instructions
        stream:
          type: boolean
          default: false

    ResponsesResponse:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          example: response
        model:
          type: string
        output:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              content:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    text:
                      type: string
        usage:
          $ref: '#/components/schemas/Usage'

    ModelList:
      type: object
      properties:
        object:
          type: string
          example: list
        data:
          type: array
          items:
            $ref: '#/components/schemas/ModelEntry'

    ModelEntry:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        object:
          type: string
          example: model
        created:
          type: integer
          format: int64
        owned_by:
          type: string
        context_window:
          type: integer
        max_context_window:
          type: integer
        input_modalities:
          type: array
          items:
            type: string
        supports_reasoning_summaries:
          type: boolean

    Error:
      type: object
      properties:
        type:
          type: string
          example: error
        code:
          type: string
          description: Error code
          enum:
            - INVALID_REQUEST
            - AUTH_ERROR
            - RATE_LIMIT
            - TIMEOUT
            - NETWORK_ERROR
            - DNS_ERROR
            - NO_ENDPOINT
            - MODEL_ERROR
            - SERVER_ERROR
        message:
          type: string
          description: Error message
        suggestion:
          type: string
          description: Recovery hint

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
          description: Overall health status
        version:
          type: string
          description: Service version
        details:
          type: object
          properties:
            endpoints:
              type: object
              properties:
                total:
                  type: integer
                healthy:
                  type: integer
            usage:
              type: string
              description: Usage service status

    ProviderStatus:
      type: object
      properties:
        name:
          type: string
          description: Provider base URL
        protocol:
          type: string
          description: Protocol format
        healthy:
          type: boolean
          description: Overall health status
        models:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              healthy:
                type: boolean