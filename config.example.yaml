# tokrouter configuration - minimal example
# Only required fields are shown. All other settings have defaults.

# Keys configuration (required - at least one key)
keys:
  - name: openai-main
    base_url: "https://api.openai.com/v1"
    format: openai
    secret: "${OPENAI_API_KEY}"  # Use env var or paste key directly
    enabled: true
    models:
      - name: gpt-4
        # priority: optional, lower = preferred. Default 0.
        priority: 100
      - name: gpt-3.5-turbo
        # No priority = default 0 (highest)

  - name: anthropic-main
    base_url: "https://api.anthropic.com/v1"
    format: anthropic
    secret: "${ANTHROPIC_API_KEY}"
    enabled: true
    models:
      - name: claude-3-opus
      - name: claude-3-sonnet

# Optional: Override defaults below
