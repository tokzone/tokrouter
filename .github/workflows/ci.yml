name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tokrouter
        uses: actions/checkout@v4
        with:
          path: tokrouter

      - name: Checkout fluxcore
        uses: actions/checkout@v4
        with:
          repository: tokzone/fluxcore
          path: fluxcore

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: |
          cd tokrouter
          go mod edit -replace=github.com/tokzone/fluxcore=$(pwd)/../fluxcore
          go build ./...

      - name: Test
        run: |
          cd tokrouter
          go test ./...

      - name: Lint
        run: |
          cd tokrouter
          go mod edit -replace=github.com/tokzone/fluxcore=$(pwd)/../fluxcore
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run