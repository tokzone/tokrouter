run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true

linters:
  disable:
    - errcheck
  enable:
    - gofmt
    - goimports
    - govet
    - staticcheck
    - gosimple
    - ineffassign
    - gocyclo
    - misspell
    - revive

linters-settings:
  gocyclo:
    min-complexity: 20
  revive:
    rules:
      - name: exported
        arguments:
          - checkPrivateReceivers

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gocyclo